<script>
(function(){
  var bar=document.getElementById("load-bar");
  var txt=document.getElementById("load-text");
  var pct=0;
  // 估算进度：定时检查 DOM 节点数增长
  var timer=setInterval(function(){
    var nodes=document.body.getElementsByTagName("*").length;
    // 用节点数估算，每 100 个节点约 5%，上限 90%
    var est=Math.min(90, Math.round(nodes/20));
    if(est>pct)pct=est;
    bar.style.width=pct+"%";
    txt.textContent="加载中 "+pct+"%";
  },200);
  // readyState 变化
  document.addEventListener("readystatechange",function(){
    if(document.readyState==="interactive"){
      pct=Math.max(pct,70);
      bar.style.width=pct+"%";
      txt.textContent="加载中 "+pct+"%";
    }
  });
  window.__loadTimer=timer;
  window.__loadSetPct=function(p){pct=p;bar.style.width=p+"%";txt.textContent="加载中 "+p+"%";};
})();
</script>
