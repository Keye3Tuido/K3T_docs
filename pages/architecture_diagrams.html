<html lang=&quot;zh-CN&quot;>
<head>
<meta charset=&quot;UTF-8&quot;>
<meta name=&quot;viewport&quot; content=&quot;width=device-width, initial-scale=1.0&quot;>
<title>MVC MVP MVVM</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: &quot;PingFang SC&quot;, &quot;Microsoft YaHei&quot;, &quot;Helvetica Neue&quot;, Arial, sans-serif;
    background: #0f0f23; color: #ccc; padding: 24px;
  }
  h1 { text-align: center; color: #4fc3f7; margin-bottom: 12px; font-size: 26px; }
  .section { margin-bottom: 48px; }
  .section-title {
    font-size: 22px; color: #4fc3f7; text-align: center;
    margin-bottom: 6px; padding: 10px;
    background: linear-gradient(90deg, #1a1a3e, #0f0f23, #1a1a3e);
    border-radius: 8px;
  }
  .section-note { text-align: center; font-size: 14px; color: #888; margin-bottom: 16px; }
  .row { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; }
  .card {
    flex: 1; min-width: 400px; max-width: 600px;
    background: #1a1a3e; border-radius: 10px;
    padding: 16px 20px; box-shadow: 0 2px 12px rgba(0,0,0,.5);
    display: flex; flex-direction: column;
  }
  .card-title { color: #aaa; font-size: 15px; margin-bottom: 10px; text-align: center; }
  .mermaid { display: flex; justify-content: center; align-items: center; flex: 1; overflow-x: auto; }
  .mermaid svg { max-width: 100%; height: auto !important; }
  .full { max-width: 1240px; margin: 0 auto; }
  table { width: 100%; border-collapse: collapse; margin-top: 12px; font-size: 14px; }
  th, td { border: 1px solid #2a2a5a; padding: 10px 12px; text-align: center; }
  th { background: #1a1a4e; color: #4fc3f7; }
  td { background: #1a1a3e; }
  .legend { max-width: 720px; margin: 0 auto 36px; background: #1a1a3e; border-radius: 10px; padding: 16px 24px; }
  .legend-title { color: #4fc3f7; font-size: 16px; margin-bottom: 8px; text-align: center; }
</style>
</head>
<body>

<h1>MVC / MVP / MVVM</h1>

<!-- Legend -->
<div class=&quot;legend&quot;>
  <div class=&quot;legend-title&quot;>Line Legend</div>
  <pre class=&quot;mermaid&quot;>
flowchart LR
  A[A] -- &quot;solid: direct call\n(caller knows callee)&quot; --> B[B]
  C[C] -. &quot;dashed: indirect notify\n(observer pattern,\nsender does NOT know receiver)&quot; .-> D[D]
  E[E] == &quot;thick: data binding\n(framework auto-sync)&quot; ==> F[F]
  </pre>
</div>

<!-- ===== MVC ===== -->
<div class=&quot;section&quot;>
  <div class=&quot;section-title&quot;>MVC &amp;mdash; Model-View-Controller</div>
  <div class=&quot;section-note&quot;>View can observe Model directly. Controller handles input and updates Model.</div>
  <div class=&quot;row&quot;>
    <div class=&quot;card&quot;>
      <div class=&quot;card-title&quot;>Data Flow (data transmission only)</div>
      <pre class=&quot;mermaid&quot;>
flowchart LR
  M[Model] -. &quot;state data\n(observer)&quot; .-> V[View]
  V -- &quot;user input&quot; --> C[Controller]
  C -- &quot;write data&quot; --> M
  V -- &quot;read data&quot; --> M
      </pre>
    </div>
    <div class=&quot;card&quot;>
      <div class=&quot;card-title&quot;>Control Flow (invocation only)</div>
      <pre class=&quot;mermaid&quot;>
flowchart TD
  U((User)) --> V[View]
  V -- &quot;forward event&quot; --> C[Controller]
  C -- &quot;call update&quot; --> M[Model]
  M -. &quot;notify&quot; .-> V
      </pre>
    </div>
  </div>
</div>

<!-- ===== MVP ===== -->
<div class=&quot;section&quot;>
  <div class=&quot;section-title&quot;>MVP &amp;mdash; Model-View-Presenter</div>
  <div class=&quot;section-note&quot;>View and Model fully decoupled. Presenter holds IView interface, pushes data to View.</div>
  <div class=&quot;row&quot;>
    <div class=&quot;card&quot;>
      <div class=&quot;card-title&quot;>Data Flow (data transmission only)</div>
      <pre class=&quot;mermaid&quot;>
flowchart LR
  M[Model] -- &quot;response data&quot; --> P[Presenter]
  P -- &quot;display data&quot; --> V[View]
  V -- &quot;user input&quot; --> P
  P -- &quot;write data&quot; --> M
      </pre>
    </div>
    <div class=&quot;card&quot;>
      <div class=&quot;card-title&quot;>Control Flow (invocation only)</div>
      <pre class=&quot;mermaid&quot;>
flowchart TD
  U((User)) --> V[View]
  V -- &quot;delegate to&quot; --> P[Presenter]
  P -- &quot;call query&quot; --> M[Model]
  P -- &quot;call IView.update&quot; --> V
      </pre>
    </div>
  </div>
</div>

<!-- ===== MVVM ===== -->
<div class=&quot;section&quot;>
  <div class=&quot;section-title&quot;>MVVM &amp;mdash; Model-View-ViewModel</div>
  <div class=&quot;section-note&quot;>Two-way data binding. ViewModel has NO reference to View. View observes ViewModel reactively.</div>
  <div class=&quot;row&quot;>
    <div class=&quot;card&quot;>
      <div class=&quot;card-title&quot;>Data Flow (data transmission only)</div>
      <pre class=&quot;mermaid&quot;>
flowchart LR
  M[Model] -- &quot;response data&quot; --> VM[ViewModel]
  VM -. &quot;display data\n(observable)&quot; .-> V[View]
  V == &quot;input data\n(binding)&quot; ==> VM
  VM -- &quot;write data&quot; --> M
      </pre>
    </div>
    <div class=&quot;card&quot;>
      <div class=&quot;card-title&quot;>Control Flow (invocation only)</div>
      <pre class=&quot;mermaid&quot;>
flowchart TD
  U((User)) --> V[View]
  V == &quot;trigger Command&quot; ==> VM[ViewModel]
  VM -- &quot;call request&quot; --> M[Model]
  VM -. &quot;notify\n(VM has no View ref)&quot; .-> V
      </pre>
    </div>
  </div>
</div>

<!-- ===== Compare ===== -->
<div class=&quot;section&quot;>
  <div class=&quot;section-title&quot;>Comparison</div>
  <div class=&quot;row&quot;>
    <div class=&quot;card full&quot; style=&quot;max-width:1240px&quot;>
      <pre class=&quot;mermaid&quot;>
flowchart TB
  subgraph MVVM
    direction LR
    V3[View] == &quot;Command&quot; ==> VM3[ViewModel]
    VM3 -. &quot;observable&quot; .-> V3
    VM3 -- &quot;request&quot; --> M3[Model]
    M3 -- &quot;data&quot; --> VM3
  end
  subgraph MVP
    direction LR
    V2[View] -- &quot;event&quot; --> P2[Presenter]
    P2 -- &quot;IView&quot; --> V2
    P2 -- &quot;request&quot; --> M2[Model]
    M2 -- &quot;data&quot; --> P2
  end
  subgraph MVC
    direction LR
    M1[Model] -. &quot;notify&quot; .-> V1[View]
    V1 -- &quot;event&quot; --> C1[Controller]
    C1 -- &quot;update&quot; --> M1
    V1 -- &quot;read&quot; --> M1
  end
      </pre>
    </div>
  </div>
  <div class=&quot;row&quot;>
    <div class=&quot;card full&quot; style=&quot;max-width:1240px&quot;>
      <table>
        <tr><th></th><th>MVC</th><th>MVP</th><th>MVVM</th></tr>
        <tr>
          <td>View to Middle</td>
          <td>solid (direct call)</td>
          <td>solid (direct call)</td>
          <td>thick (binding)</td>
        </tr>
        <tr>
          <td>Middle to View</td>
          <td>dashed (observer)</td>
          <td>solid (IView call)</td>
          <td>dashed (observable)</td>
        </tr>
        <tr>
          <td>View-Model</td>
          <td>Coupled (View reads Model)</td>
          <td>Decoupled</td>
          <td>Decoupled</td>
        </tr>
        <tr>
          <td>Middle Layer</td>
          <td>Controller</td>
          <td>Presenter</td>
          <td>ViewModel</td>
        </tr>
        <tr>
          <td>View Role</td>
          <td>Active (pulls data)</td>
          <td>Passive (receives push)</td>
          <td>Reactive (auto-update)</td>
        </tr>
        <tr>
          <td>Testability</td>
          <td>Fair</td>
          <td>Good (mock IView)</td>
          <td>Good (no View dep)</td>
        </tr>
        <tr>
          <td>Examples</td>
          <td>Spring MVC, Cocoa</td>
          <td>Android MVP, WinForms</td>
          <td>SwiftUI, Vue, WPF</td>
        </tr>
      </table>
    </div>
  </div>
</div>
